<!DOCTYPE html>
<html lang="it" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MADMIN Hub</title>
  <!-- Tabler UI -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" />
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <!-- App styles -->
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="antialiased">
  <div class="wrapper">

    <!-- Sidebar -->
    <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#sidebar-menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <h1 class="navbar-brand navbar-brand-autodark">
          <a href="#dashboard" class="text-decoration-none">
            <span class="hub-logo-text text-white">MADMIN <span class="text-azure">Hub</span></span>
          </a>
        </h1>
        <div class="navbar-nav flex-row d-lg-none">
          <div class="nav-item dropdown">
            <a href="#" class="nav-link d-flex lh-1 text-reset p-0" data-bs-toggle="dropdown">
              <span class="avatar avatar-sm" id="user-badge-mobile">U</span>
            </a>
          </div>
        </div>
        <div class="collapse navbar-collapse" id="sidebar-menu">
          <ul class="navbar-nav pt-lg-3" id="sidebar-nav">
            <!-- built by app.js -->
          </ul>
          <div class="mt-auto border-top pt-3 d-flex align-items-center px-1 mb-3">
            <span class="avatar me-2" id="user-badge">U</span>
            <div class="flex-fill">
              <small class="text-muted d-block" id="sidebar-connectedas">Connesso come</small>
              <span id="user-badge-name" class="text-white fw-medium"></span>
            </div>
            <a href="#" id="lang-switcher" class="btn btn-sm btn-ghost-light ms-1" style="font-size:.75rem">🇬🇧 EN</a>
            <a href="#" id="logout-btn" class="btn btn-sm btn-ghost-light ms-1" title="Logout">
              <i class="ti ti-logout"></i>
            </a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="page-wrapper">
      <div id="main-content">
        <!-- View rendered here by router -->
        <div class="container-xl py-4 text-center">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- CDN scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.0/dist/apexcharts.min.js"></script>

  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
