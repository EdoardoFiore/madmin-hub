<!DOCTYPE html>
<html lang="it" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MADMIN Hub — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="antialiased">
  <div class="page page-center">
    <div class="container container-tight py-4">
      <div class="text-center mb-4">
        <a href="/" class="navbar-brand navbar-brand-autodark">
          <span class="hub-logo-text">MADMIN <span class="text-primary">Hub</span></span>
        </a>
      </div>
      <div class="card card-md">
        <div class="card-body">
          <h2 class="h2 text-center mb-4" id="login-heading"></h2>
          <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
          <div id="2fa-section" class="d-none">
            <div class="mb-3">
              <label class="form-label" id="lbl-2fa-code"></label>
              <input id="totp-input" type="text" class="form-control"
                     maxlength="8" autocomplete="one-time-code" inputmode="numeric" />
            </div>
            <button id="totp-submit" class="btn btn-primary w-100"></button>
            <button id="totp-back" class="btn btn-link w-100 mt-2"></button>
          </div>
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label" id="lbl-username"></label>
              <input name="username" type="text" class="form-control" tabindex="1"
                     autocomplete="username" autofocus />
            </div>
            <div class="mb-2">
              <label class="form-label" id="lbl-password"></label>
              <input name="password" type="password" class="form-control" tabindex="2"
                     autocomplete="current-password" />
            </div>
            <div class="form-footer">
              <button type="submit" class="btn btn-primary w-100" tabindex="3" id="login-btn"></button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { t, getLang, setLang } from '/assets/js/i18n.js';

    const TOKEN_KEY = 'hub_token';
    const API = '/api';

    // Apply lang to <html>
    document.documentElement.lang = getLang();

    // Render static labels
    function applyLabels() {
      document.getElementById('login-heading').textContent   = t('login.title');
      document.getElementById('lbl-username').textContent    = t('login.username');
      document.getElementById('lbl-password').textContent    = t('login.password');
      document.getElementById('login-btn').textContent       = t('login.submit');
      document.getElementById('lbl-2fa-code').textContent    = t('login.2fa_label');
      document.getElementById('totp-input').placeholder      = t('login.2fa_placeholder');
      document.getElementById('totp-submit').textContent     = t('login.2fa_verify');
      document.getElementById('totp-back').textContent       = t('login.2fa_back');
    }
    applyLabels();

    let tempToken = null;

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    function clearError() {
      document.getElementById('login-error').classList.add('d-none');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = t('login.submitting');

      const form = e.target;
      const body = new URLSearchParams({
        username: form.username.value,
        password: form.password.value,
      });

      try {
        const res = await fetch(`${API}/auth/token`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-Language': getLang(),
          },
          body,
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || t('login.bad_creds'));
          return;
        }

        if (data.token_type === '2fa_required') {
          tempToken = data.access_token;
          document.getElementById('login-form').classList.add('d-none');
          document.getElementById('2fa-section').classList.remove('d-none');
          document.getElementById('totp-input').focus();
          return;
        }

        localStorage.setItem(TOKEN_KEY, data.access_token);
        window.location.href = '/';
      } catch (err) {
        showError(t('login.net_error'));
      } finally {
        btn.disabled = false;
        btn.textContent = t('login.submit');
      }
    });

    document.getElementById('totp-submit').addEventListener('click', async () => {
      clearError();
      const code = document.getElementById('totp-input').value.trim();
      if (!code) return;

      const res = await fetch(`${API}/auth/token/2fa?code=${encodeURIComponent(code)}`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${tempToken}`,
          'X-Language': getLang(),
        },
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.detail || t('login.bad_code'));
        return;
      }
      localStorage.setItem(TOKEN_KEY, data.access_token);
      window.location.href = '/';
    });

    document.getElementById('totp-back').addEventListener('click', () => {
      tempToken = null;
      document.getElementById('2fa-section').classList.add('d-none');
      document.getElementById('login-form').classList.remove('d-none');
    });

    document.getElementById('totp-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('totp-submit').click();
    });

    // Already logged in? Redirect
    const existing = localStorage.getItem(TOKEN_KEY);
    if (existing) window.location.href = '/';
  </script>
</body>
</html>
